version: 2

project_name: eastmoney

before:
  hooks:
    - go mod tidy
    - bash scripts/prepare-assets.sh

builds:
  - id: eastmoney
    main: ./cmd/eastmoney
    binary: eastmoney
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: eastmoney
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - config.example.yaml
      - src: go-ocr-model/ddddocr/*
        dst: go-ocr-model/ddddocr/
      - src: go-ocr-model/lib/{{ .Os }}/{{ .Arch }}/*
        dst: go-ocr-model/lib/

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  groups:
    - title: Features
      regexp: '^.*feat[(\w)]*:.*$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*fix[(\w)]*:.*$'
      order: 1
    - title: Performance
      regexp: '^.*perf[(\w)]*:.*$'
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^style:"
      - "^refactor:"
      - "^ci:"

release:
  github:
    owner: muzimu
    name: east-money
  draft: false
  prerelease: auto
